<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Trakcker | Achievement Edition</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text-main: #1e293b;
            --accent: #8b5cf6;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            text-align: center;
        }

        /* Kelas untuk menyembunyikan splash screen */
        .hide-splash {
            transform: translateY(-100%);
        }

        .logo-container {
            width: 120px; height: 120px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .logo-img { width: 80px; height: auto; }

        #enter-btn {
            background: white; color: var(--primary);
            border: none; padding: 12px 35px;
            border-radius: 30px; font-weight: bold;
            cursor: pointer; font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        /* --- Main App Container --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 60px; /* Ruang untuk tombol kembali */
            display: none;
        }

        /* --- Tombol Kembali --- */
        .back-nav {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            transition: 0.2s;
            z-index: 10;
        }

        .back-nav:hover { background: #f8fafc; transform: translateX(-3px); }

        /* --- Card Styles --- */
        .header-card {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white; padding: 25px; border-radius: 16px; margin-bottom: 20px;
        }

        .reward-card {
            background: white; padding: 20px; border-radius: 16px;
            margin-bottom: 20px; border: 2px solid var(--accent);
        }

        .progress-container {
            background: #e2e8f0; height: 15px; border-radius: 10px;
            margin: 15px 0; overflow: hidden;
        }

        #progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--secondary), #34d399);
            transition: width 0.5s ease-in-out;
        }

        .input-card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .input-group { display: grid; gap: 12px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; }
        
        button#addBtn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }

        ul { list-style: none; padding: 0; }
        li {
            background: var(--card); margin-bottom: 12px; padding: 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px; border-left: 5px solid #cbd5e1;
        }
        .completed-task { opacity: 0.6; filter: grayscale(1); }
        .btn-circle { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <img src="c:\Users\ASUS\Documents\sultan tsania html\Logo_Smansa_15_.png" alt="Logo Sekolah" class="logo-img">
        </div>
        <h1>SMA NEGERI PRO</h1>
        <p style="margin-bottom: 30px; opacity: 0.9;">Tugas Teratur, Masa Depan Terukur.</p>
        <button id="enter-btn" onclick="enterApp()">Mulai Sekarang</button>
    </div>

    <div class="container" id="main-app">
        <div class="back-nav" onclick="exitApp()">
            <span>←</span> Menu Utama
        </div>

        <div class="header-card">
            <h2 style="margin:0">🎯 Student Task Tracker</h2>
            <div style="display: flex; gap: 20px; margin-top: 15px;">
                <div>Selesai: <b id="doneCount">0</b></div>
                <div>Tersisa: <b id="pendingCount">0</b></div>
            </div>
        </div>

        <div class="reward-card">
            <strong>🎁 Target Reward: <span id="percentText">0%</span></strong>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="rewardInput" placeholder="Tulis rewardmu..." style="flex:1">
                <button onclick="saveReward()" style="background:var(--accent); color:white; border:none; padding:10px; border-radius:8px;">Set</button>
            </div>
            <p id="rewardGoalDisplay" style="font-size: 0.8em; color: gray; margin-top: 10px;"></p>
        </div>

        <div class="input-card">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Nama tugas...">
                <div style="display:flex; gap:10px;">
                    <input type="date" id="dateInput" style="flex:2">
                    <select id="priorityInput" style="flex:1">
                        <option value="low">Biasa</option>
                        <option value="medium">Sedang</option>
                        <option value="high">Penting</option>
                    </select>
                </div>
                <button id="addBtn">Tambah Tugas</button>
            </div>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        // Fungsi Navigasi
        function enterApp() {
            document.getElementById('splash-screen').classList.add('hide-splash');
            document.getElementById('main-app').style.display = 'block';
            renderTasks();
            loadReward();
        }

        function exitApp() {
            // Mengembalikan Splash Screen
            document.getElementById('splash-screen').classList.remove('hide-splash');
            // Menunggu animasi selesai sebelum menyembunyikan konten utama
            setTimeout(() => {
                document.getElementById('main-app').style.display = 'none';
            }, 500);
        }

        // Fungsi Core Aplikasi
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        function saveReward() {
            localStorage.setItem('studentReward', document.getElementById('rewardInput').value);
            loadReward();
        }

        function loadReward() {
            const reward = localStorage.getItem('studentReward') || "Belum diatur";
            document.getElementById('rewardGoalDisplay').innerText = `Target: ${reward}`;
        }

        document.getElementById('addBtn').addEventListener('click', () => {
            if (!taskInput.value) return;
            const tasks = JSON.parse(localStorage.getItem('studentTasks') || "[]");
            tasks.push({
                id: Date.now(),
                text: taskInput.value,
                date: document.getElementById('dateInput').value || "-",
                priority: document.getElementById('priorityInput').value,
                status: 'pending'
            });
            localStorage.setItem('studentTasks', JSON.stringify(tasks));
            taskInput.value = "";
            renderTasks();
        });

        function renderTasks() {
            const tasks = JSON.parse(localStorage.getItem('studentTasks') || "[]");
            taskList.innerHTML = "";
            let done = 0;

            tasks.forEach(task => {
                if(task.status === 'done') done++;
                const li = document.createElement('li');
                li.className = `${task.status === 'done' ? 'completed-task' : ''}`;
                li.style.borderLeftColor = task.priority === 'high' ? 'red' : (task.priority === 'medium' ? 'orange' : 'green');
                li.innerHTML = `
                    <div style="flex:1">
                        <strong>${task.text}</strong><br>
                        <small>📅 ${task.date}</small>
                    </div>
                    <button class="btn-circle" style="background:#dcfce7" onclick="toggleStatus(${task.id})">✔</button>
                    <button class="btn-circle" style="background:#fee2e2" onclick="deleteTask(${task.id})">✕</button>
                `;
                taskList.appendChild(li);
            });

            document.getElementById('doneCount').innerText = done;
            document.getElementById('pendingCount').innerText = tasks.length - done;
            const percent = tasks.length === 0 ? 0 : Math.round((done / tasks.length) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('percentText').innerText = percent + '%';
        }

        function toggleStatus(id) {
            let tasks = JSON.parse(localStorage.getItem('studentTasks'));
            const idx = tasks.findIndex(t => t.id === id);
            tasks[idx].status = tasks[idx].status === 'pending' ? 'done' : 'pending';
            localStorage.setItem('studentTasks', JSON.stringify(tasks));
            renderTasks();
        }

        function deleteTask(id) {
            let tasks = JSON.parse(localStorage.getItem('studentTasks'));
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('studentTasks', JSON.stringify(tasks));
            renderTasks();
        }
    </script>
</body>
</html>
